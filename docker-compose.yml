version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: auction-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: auction_deposit
      MYSQL_USER: auction
      MYSQL_PASSWORD: auction123
      TZ: Asia/Shanghai
    ports:
      - "21467:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - auction-network

  redis:
    image: redis:7-alpine
    container_name: auction-redis
    restart: always
    ports:
      - "22467:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis123
    networks:
      - auction-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auction-backend
    restart: always
    ports:
      - "19467:19467"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auction_deposit?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis123
      TZ: Asia/Shanghai
    depends_on:
      - mysql
      - redis
    networks:
      - auction-network
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auction-frontend
    restart: always
    ports:
      - "20467:80"
    environment:
      - API_BASE_URL=http://backend:19467/api
    depends_on:
      - backend
    networks:
      - auction-network

volumes:
  mysql_data:
  redis_data:
  backend_logs:

networks:
  auction-network:
    driver: bridge
